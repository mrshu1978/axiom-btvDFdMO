<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Axiom</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #080C14;
            color: white;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        #fireworks-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .content {
            z-index: 1;
            position: relative;
            text-align: center;
            padding: 2rem;
        }

        h1 {
            font-size: 4rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            color: #FFFFFF;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            font-size: 1.1rem;
            color: #8892B0;
            margin-top: 0.5rem;
            margin-bottom: 2.5rem;
        }

        #launch-btn {
            background: linear-gradient(135deg, #7B2FBE, #3B82F6);
            color: white;
            border: none;
            padding: 1rem 2.5rem;
            border-radius: 2rem;
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: 0.04em;
            cursor: pointer;
            transition: filter 0.2s ease, transform 0.2s ease;
        }

        #launch-btn:hover:not(:disabled) {
            filter: brightness(1.2);
            transform: scale(1.05);
        }

        #launch-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        footer {
            position: fixed;
            bottom: 1rem;
            width: 100%;
            text-align: center;
            font-size: 0.8rem;
            color: #8892B0;
            z-index: 1;
        }
    </style>
</head>
<body>
    <canvas id="fireworks-canvas"></canvas>
    <div class="content">
        <h1>Axiom</h1>
        <p class="subtitle">Experience the future</p>
        <button id="launch-btn">🚀 Lancia i Fuochi d'Artificio</button>
    </div>

    <footer>w marco w marghera</footer>

    <script src="js/main.js"></script>
</body>
</html>
